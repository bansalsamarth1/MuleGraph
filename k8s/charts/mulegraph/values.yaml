# Default values for mulegraph components.
replicaCount: 1
createSecrets: false

image:
  repository: mulegraph
  pullPolicy: IfNotPresent
  tag: "v1"

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    cpu: 1000m
    memory: 1024Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

spring:
  profiles: ""
  kafka:
    bootstrapServers: "mulegraph-cluster-kafka-bootstrap:9092"
  datasource:
    url: "jdbc:postgresql://mulegraph-postgresql:5432/mulegraph"
    username: "postgres"
    secretName: "mulegraph-db-secret"
  neo4j:
    uri: "bolt://mulegraph-neo4j:7687"
    secretName: "mulegraph-neo4j-secret"

# Node port configuration if ServiceType is NodePort (only for API)
nodePort: ""

probes:
  liveness:
    path: /actuator/health/liveness
    initialDelaySeconds: 120
    periodSeconds: 10
  readiness:
    path: /actuator/health/readiness
    initialDelaySeconds: 120
    periodSeconds: 10
