spring:
  application:
    name: mulegraph
  servlet:
    multipart:
      max-request-size: 1MB
      max-file-size: 1MB
  kafka:
    producer:
      bootstrap-servers: localhost:9092
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
    consumer:
      bootstrap-servers: localhost:9092
      properties:
        spring.json.trusted.packages: "com.mulegraph.*"
        spring.json.value.default.type: "com.mulegraph.fraud.domain.AlertEvent"
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
    streams:
      properties:
        commit.interval.ms: 1000
        cache.max.bytes.buffering: 0
  datasource:
    url: jdbc:postgresql://localhost:5432/mulegraph
    username: muleuser
    password: mulepass
  flyway:
    enabled: true
server:
  tomcat:
    max-http-form-post-size: 1MB

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always

mulegraph:
  api:
    key: "dev-local-api-key"
  rules:
    fan-out:
      window-seconds: 60
      grace-seconds: 15
      min-distinct-destinations: 5
    fan-in:
      window-seconds: 60
      grace-seconds: 15
      min-distinct-sources: 5
    shared-device:
      window-seconds: 60
      grace-seconds: 15
      min-distinct-sources: 3
    shared-ip:
      window-seconds: 60
      grace-seconds: 15
      min-distinct-sources: 3
