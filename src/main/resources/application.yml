spring:
  application:
    name: mulegraph
  servlet:
    multipart:
      max-request-size: 1MB
      max-file-size: 1MB
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    listener:
      observation-enabled: true
    template:
      observation-enabled: true
    producer:
      bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
    consumer:
      bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
      properties:
        spring.json.trusted.packages: "com.mulegraph.*"
        spring.json.value.default.type: "com.mulegraph.fraud.domain.AlertEvent"
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
    streams:
      properties:
        commit.interval.ms: 1000
        cache.max.bytes.buffering: 0
        default.deserialization.exception.handler: com.mulegraph.stream.DeadLetterExceptionHandler
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/mulegraph}
    username: ${POSTGRES_USER:muleuser}
    password: ${POSTGRES_PASSWORD:mulepass}
  flyway:
    enabled: true
server:
  tomcat:
    max-http-form-post-size: 1MB

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always

mulegraph:
  api:
    key: ${MULEGRAPH_API_KEY:dev-local-api-key}
  rules:
    fan-out:
      window-seconds: 60
      grace-seconds: 15
      min-distinct-destinations: 5
    fan-in:
      window-seconds: 60
      grace-seconds: 15
      min-distinct-sources: 5
    shared-device:
      window-seconds: 60
      grace-seconds: 15
      min-distinct-sources: 3
    shared-ip:
      window-seconds: 60
      grace-seconds: 15
      min-distinct-sources: 3
    circular-flow:
      max-depth: 4
      window-seconds: 86400
      amount-tolerance-percent: 10

---
spring:
  config:
    activate:
      on-profile: graph-projector
  neo4j:
    uri: ${NEO4J_URI:bolt://localhost:7687}
    authentication:
      username: ${NEO4J_USERNAME:neo4j}
      password: ${NEO4J_PASSWORD:mulepass}
