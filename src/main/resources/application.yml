spring:
  application:
    name: mulegraph
  servlet:
    multipart:
      max-request-size: 1MB
      max-file-size: 1MB
  kafka:
    producer:
      bootstrap-servers: localhost:9092
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        spring.json.add.type.headers: false

server:
  tomcat:
    max-http-form-post-size: 1MB

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always

mulegraph:
  api:
    key: "dev-local-api-key"
  rules:
    fan-out:
      window-seconds: 60
      grace-seconds: 15
      min-distinct-destinations: 5
